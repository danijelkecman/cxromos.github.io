name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  schedule:
    # Daily rebuild so the homepage "operational signal" chart rotates and
    # picks up fresh data. On fetch failure the committed fallback data is used.
    - cron: '23 5 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v4
      - name: Fetch today's operational signal
        run: node scripts/fetch-signal.mjs
        continue-on-error: true
        env:
          AISSTREAM_API_KEY: ${{ secrets.AISSTREAM_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
      - name: Install, build, and upload your site
        uses: withastro/action@v4
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
